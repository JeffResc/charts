# Default values for esphome.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Global parameters
# -- Number of replicas of the ESPHome StatefulSet
replicaCount: 1

## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
## NOTE: podAffinityPreset, podAntiAffinityPreset, and nodeAffinityPreset will be ignored when it's set
##
# -- Affinity for pod assignment
affinity: {}
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
##
# -- Node labels for pod assignment
nodeSelector: {}
## ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
##
# -- Tolerations for pod assignment
tolerations: []

# -- Additional annotations for the Pod resource
podAnnotations: {}
# -- Additional labels for the Pod resource
podLabels: {}

# -- Docker registry pull secrets
imagePullSecrets: []
# -- Name override
nameOverride: ""
# -- Full name override
fullnameOverride: ""

## Image parameters
image:
  # -- Docker image repository
  repository: ghcr.io/esphome/esphome
  # -- Docker image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

## Service account parameters
serviceAccount:
  # -- Specifies whether a service account should be created
  create: false
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Additional annotations for the ServiceAccount resource
  annotations: {}
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: ""

## Pod security context parameters
podSecurityContext:
  # -- User to run pod as
  runAsUser: 10099
  # -- Group to mount volumes in as
  fsGroup: 10099

## Security context parameters
securityContext:
  capabilities:
    # -- Capabilities to drop
    drop:
    - ALL
  # -- If root filesystem should be read-only
  readOnlyRootFilesystem: true
  # -- If pod should be run as non-root
  runAsNonRoot: true
  # -- User to run pod as
  runAsUser: 10099
  # -- Group to run pod as
  runAsGroup: 10099
  # -- If privilege escalation should be allowed
  allowPrivilegeEscalation: false
  seccompProfile:
    # -- seccomp profile type
    type: RuntimeDefault

## Service parameters
service:
  # -- Service type to create
  type: ClusterIP
  # -- Service port to use
  port: 6052

## Ingress parameters
## Configure the ingress resource that allows you to access the Apache installation
## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
##
ingress:
  # -- Enable ingress record generation
  enabled: false
  # -- IngressClass that will be be used to implement the Ingress
  className: ""
  # -- Additional annotations for the Ingress resource
  annotations: {}
  # -- An array with hostname(s) to be covered with the ingress record
  hosts: []
  # -- TLS configuration for hostname(s) to be covered with this ingress record
  tls: []

## Resources parameters
## @extra resources.limits.cpu Maximum CPU allowed
## @extra resources.limits.memory Maximum memory allowed
resources:
  requests:
    # -- Minimum CPU requested
    cpu: 10m
    # -- Minimum memory requested
    memory: 128Mi

## Autoscaling parameters
## Autoscaling parameters
## ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
##
autoscaling:
  # -- Enable Horizontal POD autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target Memory utilization percentage
  targetMemoryUtilizationPercentage: 80

## Persistence parameters
persistence:
  # -- If persistence is enabled
  enabled: false
  # -- Persistent storage PVC name
  name: "esphome-config"
  # -- Persistent storage PVC storage class
  storageClass: "my-storageclass"
  # -- Persistent storage PVC size
  size: "5Gi"

# Additional volume mounts for the StatefulSet
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Additional volumes for the StatefulSet
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

