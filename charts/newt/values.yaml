# Default values for newt.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Pangolin parameters
pangolin:
  # -- Pangolin server endpoint URL
  endpoint: "https://pangolin.example.com"

## Secret parameters
secret:
  # -- Name of the secret containing Newt credentials
  name: newt-secrets
  id:
    # -- Key in the secret for Newt ID
    key: newt_id
  secret:
    # -- Key in the secret for Newt secret
    key: newt_secret

## Image parameters
image:
  # -- Docker image repository
  repository: fosrl/newt
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

## Deployment parameters
# -- Number of replicas to deploy
replicas: 1

## Resource parameters
# -- Resource limits and requests for the container
resources: {}
