# Default values for it-tools.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

## Global parameters
# -- Number of replicas of the it-tools Deployment
replicaCount: 1

## Ref: https://kubernetes.io/docs/concepts/configuration/assign-pod-node/#affinity-and-anti-affinity
## NOTE: podAffinityPreset, podAntiAffinityPreset, and nodeAffinityPreset will be ignored when it's set
##
# -- Affinity for pod assignment
affinity: {}
## ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/
##
# -- Node labels for pod assignment
nodeSelector: {}
## ref: https://kubernetes.io/docs/concepts/configuration/taint-and-toleration/
##
# -- Tolerations for pod assignment
tolerations: []

# -- Additional annotations for the Pod resource
podAnnotations: {}
# -- Additional labels for the Pod resource
podLabels: {}

# -- Docker registry pull secrets
imagePullSecrets: []
# -- Name override
nameOverride: ""
# -- Full name override
fullnameOverride: ""

## Image parameters
image:
  # -- Container image repository
  repository: ghcr.io/sharevb/it-tools
  # -- Container image pull policy
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion
  tag: ""

## Metrics parameters
## @extra metrics.resources.limits.cpu Maximum CPU allowed
## @extra metrics.resources.limits.memory Maximum memory allowed
metrics:
  # -- Enables metrics
  enabled: false
  # -- Nginx Prometheus exporter container name
  containerName: nginx-prometheus-exporter
  image:
    # -- Metrics Container image repository
    repository: nginx/nginx-prometheus-exporter
    # -- Metrics Container image pull policy
    pullPolicy: IfNotPresent
    # -- Overrides the metrics image tag
    tag: "1.5.1"
  # -- Metrics container command arguments
  args:
    - --nginx.scrape-uri=http://localhost:8081/stub_status
  # -- Metrics port number
  port: 9113
  # -- Metrics port name
  portName: metrics
  resources: {}
  securityContext:
    capabilities:
      # -- Capabilities to drop
      drop:
      - ALL
    # -- If root filesystem should be read-only
    readOnlyRootFilesystem: true
    # -- If pod should be run as non-root
    runAsNonRoot: true
    # -- User to run pod as
    runAsUser: 10099
    # -- Group to run pod as
    runAsGroup: 10099
    # -- If privilege escalation should be allowed
    allowPrivilegeEscalation: false
    seccompProfile:
      # -- seccomp profile type
      type: RuntimeDefault

## Service account parameters
serviceAccount:
  # -- Specifies whether a service account should be created
  create: false
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: true
  # -- Additional annotations for the ServiceAccount resource
  annotations: {}
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: ""

## Security context parameters
securityContext:
  capabilities:
    # -- Capabilities to drop
    drop:
    - ALL
  # -- If root filesystem should be read-only
  readOnlyRootFilesystem: true
  # -- If container should be run as non-root
  runAsNonRoot: true
  # -- User to run container as
  runAsUser: 10099
  # -- Group to run container as
  runAsGroup: 10099
  # -- If privilege escalation should be allowed
  allowPrivilegeEscalation: false
  seccompProfile:
    # -- seccomp profile type
    type: RuntimeDefault

podSecurityContext: {}

## Service parameters
service:
  # -- Service type to create
  type: ClusterIP
  # -- Service port to use
  port: 8080

## Ingress parameters
## Configure the ingress resource that allows you to access the Apache installation
## ref: https://kubernetes.io/docs/concepts/services-networking/ingress/
##
ingress:
  # -- Enable ingress record generation
  enabled: false
  # -- IngressClass that will be be used to implement the Ingress
  className: ""
  # -- Additional annotations for the Ingress resource
  annotations: {}
  # -- An array with hostname(s) to be covered with the ingress record
  hosts: []
  # -- TLS configuration for hostname(s) to be covered with this ingress record
  tls: []

## Resources parameters
## @extra resources.limits.cpu Maximum CPU allowed
## @extra resources.limits.memory Maximum memory allowed
resources: {}

## Autoscaling parameters
## Autoscaling parameters
## ref: https://kubernetes.io/docs/tasks/run-application/horizontal-pod-autoscale/
##
autoscaling:
  # -- Enable Horizontal POD autoscaling
  enabled: false
  # -- Minimum number of replicas
  minReplicas: 1
  # -- Maximum number of replicas
  maxReplicas: 100
  # -- Target CPU utilization percentage
  targetCPUUtilizationPercentage: 80
  # -- Target Memory utilization percentage
  targetMemoryUtilizationPercentage: 80

## Nginx configuration parameters
## Nginx configuration parameters
##
nginxConf:
  # -- Provide an existing ConfigMap for the Nginx configuration
  existingConfigmap: ""
  # -- Provide a cache path override (useful for other it-tools images such as Chainguard)
  cachePath: "/var/cache/nginx"

## Extra volumes parameter
## Extra volumes parameter
##
# -- Provide extra volumes for the main pod
extraVolumes: []

## Extra containers parameter
## Extra containers parameter
##
# -- Provide extra containers for the main pod
extraContainers: []

