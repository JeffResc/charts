name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    permissions:
      contents: write
      pages: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v5

      - name: Add dependency repos
        run: |
          # Dynamically discover and add all unique Helm dependency repos from Chart.yaml files
          grep -rh '^\s*repository:' charts/*/Chart.yaml 2>/dev/null \
            | sed 's/.*repository:[[:space:]]*//' | tr -d '"' | tr -d "'" \
            | grep '^https://' | sort -u \
            | while read -r url; do
                name=$(echo "$url" | md5sum | cut -c1-8)
                echo "Adding repo $name -> $url"
                helm repo add "$name" "$url"
              done

      - name: Package charts
        run: |
          mkdir -p /tmp/chart-packages
          for chart in charts/*/; do
            if grep -q '^dependencies:' "$chart/Chart.yaml" 2>/dev/null; then
              helm dependency update "$chart"
            fi
            helm package "$chart" -d /tmp/chart-packages
          done

      - name: Update gh-pages Helm repo index
        run: |
          git fetch origin gh-pages
          git stash --include-untracked
          git switch gh-pages

          # Copy packaged charts
          cp /tmp/chart-packages/*.tgz .

          # Merge into existing index (--merge preserves old entries)
          helm repo index . --url https://charts.jeffresc.dev --merge index.yaml

          # Sync README from main
          git checkout main -- README.md

          git add index.yaml README.md *.tgz
          if ! git diff --cached --quiet; then
            git commit -m "Update Helm repo index and README"
            git push origin gh-pages
          fi
          git switch -

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push charts to GHCR
        run: |
          for pkg in /tmp/chart-packages/*.tgz; do
            [ -f "$pkg" ] || continue
            helm push "$pkg" oci://ghcr.io/jeffresc/charts
          done
