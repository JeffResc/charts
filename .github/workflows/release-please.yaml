name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - uses: azure/setup-helm@v5

      - uses: ./.github/actions/helm-deps

      - name: Publish released charts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages

          echo '${{ needs.release-please.outputs.paths_released }}' | jq -r '.[]' | while read -r chart_dir; do
            tmpdir=$(mktemp -d)
            pkg=$(helm package "$chart_dir" -d "$tmpdir" | awk '{print $NF}')
            tag=$(basename "$pkg" .tgz)

            gh release upload "$tag" "$pkg"

            helm repo index "$tmpdir" \
              --url "https://github.com/${{ github.repository }}/releases/download/$tag" \
              --merge /tmp/gh-pages/index.yaml
            cp "$tmpdir/index.yaml" /tmp/gh-pages/index.yaml

            helm push "$pkg" oci://ghcr.io/$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/charts
          done

          git -C /tmp/gh-pages add index.yaml
          if ! git -C /tmp/gh-pages diff --cached --quiet; then
            git -C /tmp/gh-pages commit -m "chore: update Helm index"
            git -C /tmp/gh-pages push origin HEAD:gh-pages
          fi

      - uses: mikefarah/yq@v4

      - name: Update charts table in README
        run: |
          rows=""
          for chart_yaml in $(ls charts/*/Chart.yaml | sort); do
            name=$(yq '.name' "$chart_yaml")
            version=$(yq '.version' "$chart_yaml")
            app_version=$(yq '.appVersion' "$chart_yaml")
            description=$(yq '.description' "$chart_yaml")
            rows="${rows}<tr>\n<td markdown=\"span\">${name}</td>\n<td markdown=\"span\">${version}</td>\n<td markdown=\"span\">${app_version}</td>\n<td markdown=\"span\">${description}</td>\n</tr>\n"
          done

          table="<table>\n<thead>\n<tr class=\"header\">\n<th><strong>Chart</strong></th>\n<th><strong>Chart Version</strong></th>\n<th><strong>App Version</strong></th>\n<th><strong>Description</strong></th>\n</tr>\n</thead>\n<tbody>\n${rows}</tbody>\n</table>"

          perl -i -0pe "s|<!-- CHARTS_TABLE_START -->.*?<!-- CHARTS_TABLE_END -->|<!-- CHARTS_TABLE_START -->\n${table}\n<!-- CHARTS_TABLE_END -->|s" README.md

          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update charts table in README"
            git push origin HEAD:main
          fi

          cp README.md /tmp/gh-pages/README.md
          git -C /tmp/gh-pages add README.md
          if ! git -C /tmp/gh-pages diff --cached --quiet; then
            git -C /tmp/gh-pages commit -m "chore: update charts table in README"
            git -C /tmp/gh-pages push origin HEAD:gh-pages
          fi
