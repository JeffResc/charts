name: Regenerate Docs

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "charts/**"

jobs:
  regenerate-docs:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install tools
        run: |
          HELM_DOCS_VERSION="1.14.2"
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" | tar xz -C /usr/local/bin helm-docs
          pip install pyyaml

      - name: Regenerate READMEs
        run: |
          helm-docs --chart-search-root charts/

      - name: Update root README
        run: |
          ./scripts/update-root-readme.sh

      - name: Commit and push changes
        run: |
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate docs"
            git push
          else
            echo "No changes to commit"
          fi
