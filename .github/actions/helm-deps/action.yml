name: Setup Helm Dependencies
description: Add Helm chart dependency repos and update chart dependencies

runs:
  using: composite
  steps:
    - name: Add dependency repos
      shell: bash
      run: |
        grep -rh '^\s*repository:' charts/*/Chart.yaml 2>/dev/null \
          | sed 's/.*repository:[[:space:]]*//' | tr -d '"' | tr -d "'" \
          | grep '^https://' | sort -u \
          | while read -r url; do
              name=$(echo "$url" | md5sum | cut -c1-8)
              helm repo add "$name" "$url"
            done

    - name: Build chart dependencies
      shell: bash
      run: |
        for chart in charts/*; do
          if [ -d "$chart" ] && grep -q '^dependencies:' "$chart/Chart.yaml" 2>/dev/null; then
            helm dependency update "$chart"
          fi
        done
